<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GramSeva Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <a href="/index.html" class="sidebar__header-logo">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z"/>
            <path d="M10 16l4 4 8-8"/>
          </svg>
          GramSeva
        </a>
      </div>
      <nav class="sidebar__nav">
        <a href="/admin/dashboard.html" class="sidebar__link sidebar__link--active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span data-i18n="dashboard">Dashboard</span>
        </a>
        <a href="/admin/technicians.html" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span data-i18n="technicians">Technicians</span>
        </a>
        <a href="/admin/history.html" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span data-i18n="history">History</span>
        </a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar" id="admin-avatar">A</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="admin-name">Administrator</div>
            <div class="sidebar__user-role" data-i18n="admin_portal">Admin Portal</div>
          </div>
        </div>
        <button class="btn btn--outline btn--block btn--sm" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span data-i18n="logout">Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <header class="main-header">
        <div class="main-header__left">
          <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="main-header__title" data-i18n="all_complaints">All Complaints</h1>
        </div>
        <div class="main-header__right">
          <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search complaints..." data-i18n="search">
          </div>
          <div id="lang-container"></div>
        </div>
      </header>

      <div class="main-body">
        <!-- Stats -->
        <div class="stats-grid" id="stats"></div>

        <!-- Filter -->
        <div class="filter-tabs" id="filter-tabs">
          <button class="filter-tab filter-tab--active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="Pending" data-i18n="pending">Pending</button>
          <button class="filter-tab" data-filter="Assigned" data-i18n="assigned">Assigned</button>
          <button class="filter-tab" data-filter="In Progress" data-i18n="in_progress">In Progress</button>
          <button class="filter-tab" data-filter="Completed" data-i18n="completed">Completed</button>
        </div>

        <!-- Complaints List -->
        <div class="complaints-list" id="complaints-list"></div>
      </div>
    </div>
  </div>

  <!-- Complaint Detail / Manage Modal -->
  <div class="modal-overlay" id="manage-modal">
    <div class="modal">
      <div class="modal__header">
        <h3>Manage Complaint</h3>
        <button class="modal__close" onclick="closeManageModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body" id="manage-body"></div>
      <div class="modal__footer" id="manage-footer"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    let session;
    let currentFilter = 'all';
    let searchQuery = '';

    document.addEventListener('DOMContentLoaded', () => {
      session = checkAuth('admin');
      if (!session) return;

      document.getElementById('admin-name').textContent = session.name;
      document.getElementById('admin-avatar').textContent = session.name.charAt(0).toUpperCase();

      renderLanguageSelector('lang-container');
      applyTranslations();
      initSidebar();
      loadComplaints();

      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('filter-tab--active'));
          tab.classList.add('filter-tab--active');
          currentFilter = tab.dataset.filter;
          loadComplaints();
        });
      });

      // Search
      document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        loadComplaints();
      });
    });

    function loadComplaints() {
      let all = db.getAll('gs_complaints');

      // Stats
      const total = all.length;
      const pending = all.filter(c => c.status === 'Pending').length;
      const inProgress = all.filter(c => c.status === 'In Progress' || c.status === 'Assigned').length;
      const completed = all.filter(c => c.status === 'Completed').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat-card stat-card--primary">
          <div class="stat-card__label" data-i18n="total_complaints">Total</div>
          <div class="stat-card__value">${total}</div>
        </div>
        <div class="stat-card stat-card--accent">
          <div class="stat-card__label" data-i18n="pending">Pending</div>
          <div class="stat-card__value">${pending}</div>
        </div>
        <div class="stat-card stat-card--info">
          <div class="stat-card__label" data-i18n="in_progress">Active</div>
          <div class="stat-card__value">${inProgress}</div>
        </div>
        <div class="stat-card stat-card--success">
          <div class="stat-card__label" data-i18n="completed">Completed</div>
          <div class="stat-card__value">${completed}</div>
        </div>
      `;

      // Filter
      let filtered = currentFilter === 'all' ? all : all.filter(c => c.status === currentFilter);

      // Search
      if (searchQuery) {
        filtered = filtered.filter(c =>
          c.title.toLowerCase().includes(searchQuery) ||
          c.complaint_id.toLowerCase().includes(searchQuery) ||
          c.category.toLowerCase().includes(searchQuery) ||
          c.village.toLowerCase().includes(searchQuery) ||
          (c.user_name && c.user_name.toLowerCase().includes(searchQuery))
        );
      }

      const technicians = db.getAll('gs_technicians');
      const listEl = document.getElementById('complaints-list');

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3 data-i18n="no_complaints">No complaints found</h3>
            <p>No complaints match the current filter.</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = filtered
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .map(c => {
          const techOptions = technicians.map(t =>
            `<option value="${t.technician_id}" ${c.technician_id === t.technician_id ? 'selected' : ''}>${escapeHtml(t.name)} (${escapeHtml(t.area)})</option>`
          ).join('');

          return `
            <div class="complaint-card">
              <div class="complaint-card__header">
                <div>
                  <div class="complaint-card__title">${escapeHtml(c.title)}</div>
                  <span class="complaint-card__id">#${c.complaint_id}</span>
                </div>
                <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                  ${c.priority ? priorityBadge(c.priority) : '<span class="priority-badge" style="background:#F3F4F6;color:#6B7280;">No Priority</span>'}
                  ${statusBadge(c.status)}
                </div>
              </div>
              <div class="complaint-card__meta">
                <span>By: ${escapeHtml(c.user_name || 'Unknown')}</span>
                <span>${c.category}</span>
                <span>${c.village}, ${c.district}</span>
                <span>${formatDate(c.created_at)}</span>
              </div>
              <div class="complaint-card__desc">${escapeHtml(c.description).substring(0, 150)}${c.description.length > 150 ? '...' : ''}</div>
              <div class="complaint-card__actions">
                <!-- Priority Buttons -->
                <div style="display:flex; gap:4px; align-items:center; flex-wrap:wrap;">
                  <button class="btn btn--sm ${c.priority === 'Urgent' ? '' : 'btn--outline'}" style="${c.priority === 'Urgent' ? 'background:#DC2626;color:#fff;' : ''}" onclick="setPriority('${c.complaint_id}','Urgent')" data-i18n="urgent">Urgent</button>
                  <button class="btn btn--sm ${c.priority === 'High' ? '' : 'btn--outline'}" style="${c.priority === 'High' ? 'background:#EA8C00;color:#fff;' : ''}" onclick="setPriority('${c.complaint_id}','High')" data-i18n="high">High</button>
                  <button class="btn btn--sm ${c.priority === 'Medium' ? '' : 'btn--outline'}" style="${c.priority === 'Medium' ? 'background:#CA8A04;color:#fff;' : ''}" onclick="setPriority('${c.complaint_id}','Medium')" data-i18n="medium">Medium</button>
                  <button class="btn btn--sm ${c.priority === 'Low' ? '' : 'btn--outline'}" style="${c.priority === 'Low' ? 'background:#16A34A;color:#fff;' : ''}" onclick="setPriority('${c.complaint_id}','Low')" data-i18n="low">Low</button>
                </div>
                <!-- Assign Technician -->
                ${c.status !== 'Completed' ? `
                <div style="display:flex; gap:8px; align-items:center; margin-left:auto; flex-wrap:wrap;">
                  <select class="form-input" style="width:auto; min-width:160px; padding:6px 10px; font-size:0.8125rem;" onchange="assignTechnician('${c.complaint_id}', this.value)">
                    <option value="">-- Assign Technician --</option>
                    ${techOptions}
                  </select>
                  <button class="btn btn--outline btn--sm" onclick="showManageModal('${c.complaint_id}')">Details</button>
                </div>
                ` : `<button class="btn btn--outline btn--sm" style="margin-left:auto;" onclick="showManageModal('${c.complaint_id}')">Details</button>`}
              </div>
            </div>
          `;
        }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function setPriority(id, priority) {
      db.update('gs_complaints', 'complaint_id', id, { priority });
      showToast(`Priority set to ${priority}`, 'success');
      loadComplaints();
    }

    function assignTechnician(complaintId, techId) {
      if (!techId) return;
      db.update('gs_complaints', 'complaint_id', complaintId, {
        technician_id: techId,
        status: 'Assigned'
      });
      showToast('Technician assigned successfully', 'success');
      loadComplaints();
    }

    function showManageModal(id) {
      const c = db.getById('gs_complaints', 'complaint_id', id);
      if (!c) return;

      const tech = c.technician_id
        ? db.getById('gs_technicians', 'technician_id', c.technician_id)
        : null;

      document.getElementById('manage-body').innerHTML = `
        <div class="detail-row"><div class="detail-row__label">Complaint ID</div><div class="detail-row__value" style="font-family:monospace;">${c.complaint_id}</div></div>
        <div class="detail-row"><div class="detail-row__label">Title</div><div class="detail-row__value">${escapeHtml(c.title)}</div></div>
        <div class="detail-row"><div class="detail-row__label">Description</div><div class="detail-row__value">${escapeHtml(c.description)}</div></div>
        <div class="detail-row"><div class="detail-row__label">Filed By</div><div class="detail-row__value">${escapeHtml(c.user_name || 'Unknown')}</div></div>
        <div class="detail-row"><div class="detail-row__label">Category</div><div class="detail-row__value">${c.category}</div></div>
        <div class="detail-row"><div class="detail-row__label">Priority</div><div class="detail-row__value">${c.priority ? priorityBadge(c.priority) : 'Not set'}</div></div>
        <div class="detail-row"><div class="detail-row__label">Status</div><div class="detail-row__value">${statusBadge(c.status)}</div></div>
        <div class="detail-row"><div class="detail-row__label">Location</div><div class="detail-row__value">${escapeHtml(c.address)}, ${escapeHtml(c.village)}, ${escapeHtml(c.district)}, ${escapeHtml(c.state)} - ${c.pincode}</div></div>
        <div class="detail-row"><div class="detail-row__label">Technician</div><div class="detail-row__value">${tech ? escapeHtml(tech.name) + ' (' + escapeHtml(tech.area) + ')' : 'Not assigned'}</div></div>
        <div class="detail-row"><div class="detail-row__label">Filed On</div><div class="detail-row__value">${formatDate(c.created_at)}</div></div>
        ${c.image_proof ? `<div class="detail-row"><div class="detail-row__label">Proof Image</div><div class="detail-row__value"><img src="${c.image_proof}" style="max-width:100%; border-radius:8px; border:1px solid var(--gs-border);" alt="Completion proof"></div></div>` : ''}
      `;

      let footerHtml = '';
      if (c.status === 'Pending' || c.status === 'Assigned') {
        footerHtml = `<button class="btn btn--primary btn--sm" onclick="updateStatus('${c.complaint_id}', 'In Progress')">Mark In Progress</button>`;
      }
      if (c.status === 'In Progress') {
        footerHtml = `<button class="btn btn--primary btn--sm" onclick="updateStatus('${c.complaint_id}', 'Completed')">Mark Completed</button>`;
      }
      footerHtml += `<button class="btn btn--outline btn--sm" onclick="closeManageModal()">Close</button>`;
      document.getElementById('manage-footer').innerHTML = footerHtml;

      document.getElementById('manage-modal').classList.add('active');
    }

    function updateStatus(id, status) {
      db.update('gs_complaints', 'complaint_id', id, { status });
      showToast(`Status updated to ${status}`, 'success');
      closeManageModal();
      loadComplaints();
    }

    function closeManageModal() {
      document.getElementById('manage-modal').classList.remove('active');
    }

    document.getElementById('manage-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeManageModal();
    });
  </script>
</body>
</html>
