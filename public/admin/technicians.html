<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Technicians - GramSeva Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <a href="/index.html" class="sidebar__header-logo">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z"/>
            <path d="M10 16l4 4 8-8"/>
          </svg>
          GramSeva
        </a>
      </div>
      <nav class="sidebar__nav">
        <a href="/admin/dashboard.html" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span data-i18n="dashboard">Dashboard</span>
        </a>
        <a href="/admin/technicians.html" class="sidebar__link sidebar__link--active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span data-i18n="technicians">Technicians</span>
        </a>
        <a href="/admin/history.html" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span data-i18n="history">History</span>
        </a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar" id="admin-avatar">A</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="admin-name">Administrator</div>
            <div class="sidebar__user-role" data-i18n="admin_portal">Admin Portal</div>
          </div>
        </div>
        <button class="btn btn--outline btn--block btn--sm" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span data-i18n="logout">Logout</span>
        </button>
      </div>
    </aside>

    <div class="main-content">
      <header class="main-header">
        <div class="main-header__left">
          <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="main-header__title" data-i18n="manage_technicians">Manage Technicians</h1>
        </div>
        <div class="main-header__right">
          <div id="lang-container"></div>
        </div>
      </header>

      <div class="main-body">
        <!-- Create Technician Form -->
        <div class="section-header">
          <h2 data-i18n="create_technician">Create Technician</h2>
        </div>

        <div style="background: var(--gs-white); border: 1px solid var(--gs-border); border-radius: var(--gs-radius-lg); padding: 24px; box-shadow: var(--gs-shadow-sm); margin-bottom: 32px;">
          <form id="tech-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="t-name" data-i18n="tech_name">Technician Name</label>
                <input type="text" id="t-name" class="form-input" required>
              </div>
              <div class="form-group">
                <label for="t-id" data-i18n="tech_id">Technician ID</label>
                <input type="text" id="t-id" class="form-input" required placeholder="e.g., TECH-001">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="t-password" data-i18n="password">Password</label>
                <input type="password" id="t-password" class="form-input" required minlength="4">
              </div>
              <div class="form-group">
                <label for="t-phone" data-i18n="phone">Phone</label>
                <input type="tel" id="t-phone" class="form-input" required>
              </div>
            </div>
            <div class="form-group">
              <label for="t-area" data-i18n="assigned_area">Assigned Area</label>
              <input type="text" id="t-area" class="form-input" required placeholder="e.g., Ward 5, Village Name">
            </div>
            <button type="submit" class="btn btn--primary" id="form-submit-btn" data-i18n="create_technician">Create Technician</button>
            <button type="button" class="btn btn--outline" id="cancel-edit-btn" style="display:none;" onclick="cancelEdit()">Cancel</button>
          </form>
        </div>

        <!-- Technicians List -->
        <div class="section-header">
          <h2 data-i18n="technicians">Technicians</h2>
        </div>

        <div id="tech-list"></div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:400px;">
      <div class="modal__header">
        <h3>Confirm Delete</h3>
        <button class="modal__close" onclick="closeDeleteModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <p data-i18n="confirm_delete">Are you sure you want to delete this technician? This action cannot be undone.</p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--outline btn--sm" onclick="closeDeleteModal()" data-i18n="cancel">Cancel</button>
        <button class="btn btn--danger btn--sm" id="confirm-delete-btn" data-i18n="delete">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    let session;
    let editingId = null;
    let deletingId = null;

    document.addEventListener('DOMContentLoaded', () => {
      session = checkAuth('admin');
      if (!session) return;

      document.getElementById('admin-name').textContent = session.name;
      document.getElementById('admin-avatar').textContent = session.name.charAt(0).toUpperCase();

      renderLanguageSelector('lang-container');
      applyTranslations();
      initSidebar();
      loadTechnicians();
    });

    // Create / Update technician
    document.getElementById('tech-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('t-name').value.trim();
      const techId = document.getElementById('t-id').value.trim();
      const password = document.getElementById('t-password').value;
      const phone = document.getElementById('t-phone').value.trim();
      const area = document.getElementById('t-area').value.trim();

      if (!name || !techId || !phone || !area) {
        showToast('Please fill in all required fields.', 'error');
        return;
      }

      if (editingId) {
        // Update existing
        const updates = { name, phone, area };
        if (password) {
          updates.password = await hashPassword(password);
        }
        db.update('gs_technicians', 'technician_id', editingId, updates);
        showToast('Technician updated successfully', 'success');
        cancelEdit();
      } else {
        // Check for duplicate ID
        const existing = db.getById('gs_technicians', 'technician_id', techId);
        if (existing) {
          showToast('A technician with this ID already exists.', 'error');
          return;
        }
        if (!password) {
          showToast('Password is required for new technicians.', 'error');
          return;
        }
        const hashedPw = await hashPassword(password);
        db.insert('gs_technicians', {
          technician_id: techId,
          name,
          password: hashedPw,
          phone,
          area,
          created_at: new Date().toISOString()
        });
        showToast('Technician created successfully', 'success');
        document.getElementById('tech-form').reset();
      }

      loadTechnicians();
    });

    function loadTechnicians() {
      const techs = db.getAll('gs_technicians');
      const complaints = db.getAll('gs_complaints');
      const listEl = document.getElementById('tech-list');

      if (techs.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h3>No technicians yet</h3>
            <p>Create your first technician using the form above.</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = `
        <div class="gs-table-wrapper">
          <table class="gs-table">
            <thead>
              <tr>
                <th>ID</th>
                <th data-i18n="name">Name</th>
                <th data-i18n="phone">Phone</th>
                <th data-i18n="assigned_area">Area</th>
                <th>Assigned</th>
                <th data-i18n="completed">Completed</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${techs.map(t => {
                const assigned = complaints.filter(c => c.technician_id === t.technician_id && c.status !== 'Completed').length;
                const completed = complaints.filter(c => c.technician_id === t.technician_id && c.status === 'Completed').length;
                return `
                  <tr>
                    <td style="font-family:monospace; font-size:0.8125rem;">${escapeHtml(t.technician_id)}</td>
                    <td><strong>${escapeHtml(t.name)}</strong></td>
                    <td>${escapeHtml(t.phone)}</td>
                    <td>${escapeHtml(t.area)}</td>
                    <td><span class="badge badge--assigned">${assigned}</span></td>
                    <td><span class="badge badge--completed">${completed}</span></td>
                    <td>
                      <div style="display:flex; gap:6px;">
                        <button class="btn btn--outline btn--sm" onclick="editTechnician('${t.technician_id}')" data-i18n="edit">Edit</button>
                        <button class="btn btn--danger btn--sm" onclick="confirmDelete('${t.technician_id}')" data-i18n="delete">Delete</button>
                      </div>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function editTechnician(techId) {
      const tech = db.getById('gs_technicians', 'technician_id', techId);
      if (!tech) return;

      editingId = techId;
      document.getElementById('t-name').value = tech.name;
      document.getElementById('t-id').value = tech.technician_id;
      document.getElementById('t-id').disabled = true;
      document.getElementById('t-password').value = '';
      document.getElementById('t-password').placeholder = 'Leave blank to keep current';
      document.getElementById('t-password').required = false;
      document.getElementById('t-phone').value = tech.phone;
      document.getElementById('t-area').value = tech.area;

      document.getElementById('form-submit-btn').textContent = 'Update Technician';
      document.getElementById('cancel-edit-btn').style.display = 'inline-flex';

      // Scroll to form
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('tech-form').reset();
      document.getElementById('t-id').disabled = false;
      document.getElementById('t-password').placeholder = '';
      document.getElementById('t-password').required = true;
      document.getElementById('form-submit-btn').textContent = t('create_technician');
      document.getElementById('cancel-edit-btn').style.display = 'none';
    }

    function confirmDelete(techId) {
      deletingId = techId;
      document.getElementById('delete-modal').classList.add('active');
      document.getElementById('confirm-delete-btn').onclick = () => {
        db.delete('gs_technicians', 'technician_id', deletingId);
        showToast('Technician deleted', 'success');
        closeDeleteModal();
        loadTechnicians();
      };
    }

    function closeDeleteModal() {
      deletingId = null;
      document.getElementById('delete-modal').classList.remove('active');
    }

    document.getElementById('delete-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDeleteModal();
    });
  </script>
</body>
</html>
