<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - GramSeva</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__header">
        <div class="auth-card__logo">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z"/>
            <path d="M10 16l4 4 8-8"/>
          </svg>
          <span>GramSeva</span>
        </div>
        <h2 data-i18n="login">Login</h2>
        <p data-i18n="admin_portal">Administrator Portal</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email" data-i18n="email">Email</label>
          <input type="email" id="email" class="form-input" required placeholder="admin@gramseva.com">
        </div>

        <div class="form-group">
          <label for="password" data-i18n="password">Password</label>
          <input type="password" id="password" class="form-input" required placeholder="admin123">
        </div>

        <button type="submit" class="btn btn--primary btn--block" data-i18n="login">Login</button>
      </form>

      <div class="auth-card__footer">
        <a href="/index.html">Back to Home</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      applyTranslations();
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Please fill in all fields.', 'error');
        return;
      }

      const admins = db.getAll('gs_admins');
      const hashedPw = await hashPassword(password);
      const admin = admins.find(a => a.email === email && a.password === hashedPw);

      if (!admin) {
        showToast(t('login_failed'), 'error');
        return;
      }

      setSession('admin', {
        admin_id: admin.admin_id,
        name: admin.name,
        email: admin.email
      });

      window.location.href = '/admin/dashboard.html';
    });
  </script>
</body>
</html>
