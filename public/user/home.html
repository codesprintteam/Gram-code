<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - GramSeva User</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <a href="/index.html" class="sidebar__header-logo">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z"/>
            <path d="M10 16l4 4 8-8"/>
          </svg>
          GramSeva
        </a>
      </div>
      <nav class="sidebar__nav">
        <a href="/user/home.html" class="sidebar__link sidebar__link--active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span data-i18n="home">Home</span>
        </a>
        <a href="/user/history.html" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span data-i18n="my_history">My Complaints</span>
        </a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar" id="user-avatar">U</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="user-name">User</div>
            <div class="sidebar__user-role" data-i18n="user_portal">User Portal</div>
          </div>
        </div>
        <button class="btn btn--outline btn--block btn--sm" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span data-i18n="logout">Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="main-header">
        <div class="main-header__left">
          <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="main-header__title" data-i18n="submit_complaint">Submit Complaint</h1>
        </div>
        <div class="main-header__right">
          <div id="lang-container"></div>
        </div>
      </header>

      <div class="main-body">
        <!-- Complaint Form -->
        <div id="complaint-form-section">
          <div style="background: var(--gs-white); border: 1px solid var(--gs-border); border-radius: var(--gs-radius-lg); padding: 28px; box-shadow: var(--gs-shadow-sm);">
            <form id="complaint-form" novalidate>
              <div class="form-group">
                <label for="c-title" data-i18n="complaint_title">Complaint Title</label>
                <div class="input-with-voice">
                  <input type="text" id="c-title" class="form-input" required>
                  <button type="button" class="voice-btn" onclick="startListening(document.getElementById('c-title'))" aria-label="Voice input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label for="c-desc" data-i18n="complaint_desc">Complaint Description</label>
                <div class="input-with-voice">
                  <textarea id="c-desc" class="form-input" rows="4" required></textarea>
                  <button type="button" class="voice-btn" onclick="startListening(document.getElementById('c-desc'))" aria-label="Voice input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label for="c-category" data-i18n="category">Category</label>
                <select id="c-category" class="form-input" required>
                  <option value="">-- Select --</option>
                  <option value="Water Supply" data-i18n="water">Water Supply</option>
                  <option value="Electricity" data-i18n="electricity">Electricity</option>
                  <option value="Roads" data-i18n="roads">Roads &amp; Infrastructure</option>
                  <option value="Sanitation" data-i18n="sanitation">Sanitation</option>
                  <option value="Healthcare" data-i18n="healthcare">Healthcare</option>
                  <option value="Education" data-i18n="education">Education</option>
                  <option value="Agriculture" data-i18n="agriculture">Agriculture</option>
                  <option value="Other" data-i18n="other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label for="c-address" data-i18n="address">Address</label>
                <input type="text" id="c-address" class="form-input" required>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="c-village" data-i18n="village">Village</label>
                  <input type="text" id="c-village" class="form-input" required>
                </div>
                <div class="form-group">
                  <label for="c-district" data-i18n="district">District</label>
                  <input type="text" id="c-district" class="form-input" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="c-state" data-i18n="state">State</label>
                  <input type="text" id="c-state" class="form-input" required>
                </div>
                <div class="form-group">
                  <label for="c-pincode" data-i18n="pincode">Pincode</label>
                  <input type="text" id="c-pincode" class="form-input" required pattern="[0-9]{6}">
                </div>
              </div>

              <button type="submit" class="btn btn--primary btn--block" data-i18n="submit_complaint">Submit Complaint</button>
            </form>
          </div>
        </div>

        <!-- Success State (hidden by default) -->
        <div id="success-section" style="display: none;">
          <div class="success-card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <h3 data-i18n="complaint_submitted">Complaint Submitted Successfully</h3>
            <p style="color: var(--gs-text-secondary); margin-bottom: 16px;" data-i18n="complaint_id">Complaint ID</p>
            <div class="complaint-id-display">
              <span id="generated-id"></span>
              <button class="btn btn--primary btn--sm" onclick="copyToClipboard(document.getElementById('generated-id').textContent, this)" data-i18n="copy">Copy</button>
            </div>
            <div style="margin-top: 24px;">
              <button class="btn btn--outline" onclick="resetForm()" data-i18n="submit_complaint">Submit Another Complaint</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/voice.js"></script>
  <script>
    let session;

    document.addEventListener('DOMContentLoaded', () => {
      session = checkAuth('user');
      if (!session) return;

      document.getElementById('user-name').textContent = session.name;
      document.getElementById('user-avatar').textContent = session.name.charAt(0).toUpperCase();

      // Pre-fill address fields from user profile
      document.getElementById('c-address').value = session.address || '';
      document.getElementById('c-village').value = session.village || '';
      document.getElementById('c-district').value = session.district || '';
      document.getElementById('c-state').value = session.state || '';
      document.getElementById('c-pincode').value = session.pincode || '';

      renderLanguageSelector('lang-container');
      applyTranslations();
      initSidebar();
    });

    document.getElementById('complaint-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const title = document.getElementById('c-title').value.trim();
      const desc = document.getElementById('c-desc').value.trim();
      const category = document.getElementById('c-category').value;
      const address = document.getElementById('c-address').value.trim();
      const village = document.getElementById('c-village').value.trim();
      const district = document.getElementById('c-district').value.trim();
      const state = document.getElementById('c-state').value.trim();
      const pincode = document.getElementById('c-pincode').value.trim();

      if (!title || !desc || !category || !address || !village || !district || !state || !pincode) {
        showToast('Please fill in all fields.', 'error');
        return;
      }

      const complaintId = generateComplaintId();

      db.insert('gs_complaints', {
        complaint_id: complaintId,
        user_id: session.user_id,
        user_name: session.name,
        title,
        description: desc,
        category,
        address,
        village,
        district,
        state,
        pincode,
        priority: '',
        status: 'Pending',
        technician_id: '',
        created_at: new Date().toISOString(),
        image_proof: ''
      });

      document.getElementById('generated-id').textContent = complaintId;
      document.getElementById('complaint-form-section').style.display = 'none';
      document.getElementById('success-section').style.display = 'block';
    });

    function resetForm() {
      document.getElementById('complaint-form').reset();
      // Re-fill address fields
      document.getElementById('c-address').value = session.address || '';
      document.getElementById('c-village').value = session.village || '';
      document.getElementById('c-district').value = session.district || '';
      document.getElementById('c-state').value = session.state || '';
      document.getElementById('c-pincode').value = session.pincode || '';

      document.getElementById('complaint-form-section').style.display = 'block';
      document.getElementById('success-section').style.display = 'none';
    }
  </script>
</body>
</html>
