<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GramSeva Technician</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <a href="/index.html" class="sidebar__header-logo">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z"/>
            <path d="M10 16l4 4 8-8"/>
          </svg>
          GramSeva
        </a>
      </div>
      <nav class="sidebar__nav">
        <a href="/technician/dashboard.html" class="sidebar__link sidebar__link--active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span data-i18n="dashboard">Dashboard</span>
        </a>
        <a href="/technician/settings.html" class="sidebar__link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span data-i18n="settings">Settings</span>
        </a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar" id="tech-avatar">T</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name" id="tech-name">Technician</div>
            <div class="sidebar__user-role" data-i18n="tech_portal">Technician Portal</div>
          </div>
        </div>
        <button class="btn btn--outline btn--block btn--sm" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span data-i18n="logout">Logout</span>
        </button>
      </div>
    </aside>

    <div class="main-content">
      <header class="main-header">
        <div class="main-header__left">
          <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="main-header__title" data-i18n="assigned_to_you">Assigned to You</h1>
        </div>
        <div class="main-header__right">
          <div id="lang-container"></div>
        </div>
      </header>

      <div class="main-body">
        <!-- Stats -->
        <div class="stats-grid" id="stats"></div>

        <!-- Filter -->
        <div class="filter-tabs" id="filter-tabs">
          <button class="filter-tab filter-tab--active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="Assigned" data-i18n="assigned">New</button>
          <button class="filter-tab" data-filter="In Progress" data-i18n="in_progress">In Progress</button>
          <button class="filter-tab" data-filter="Completed" data-i18n="completed">Completed</button>
        </div>

        <!-- Complaints List -->
        <div class="complaints-list" id="complaints-list"></div>
      </div>
    </div>
  </div>

  <!-- Image Upload Modal -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal" style="max-width:480px;">
      <div class="modal__header">
        <h3 data-i18n="mark_complete">Mark as Completed</h3>
        <button class="modal__close" onclick="closeUploadModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <p style="margin-bottom:16px; color:var(--gs-text-secondary);">Upload an image as proof of completed work before marking this complaint as done.</p>
        <div class="form-group">
          <label for="proof-image" data-i18n="upload_proof">Upload Image Proof</label>
          <input type="file" id="proof-image" class="form-input" accept="image/*" style="padding:8px;">
        </div>
        <div id="image-preview" style="display:none; margin-top:12px;">
          <img id="preview-img" style="max-width:100%; border-radius:8px; border:1px solid var(--gs-border);" alt="Preview">
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--outline btn--sm" onclick="closeUploadModal()" data-i18n="cancel">Cancel</button>
        <button class="btn btn--primary btn--sm" id="confirm-complete-btn" data-i18n="mark_complete">Mark Complete</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <div class="modal__header">
        <h3 data-i18n="view_details">Complaint Details</h3>
        <button class="modal__close" onclick="closeDetailModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body" id="detail-body"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    let session;
    let currentFilter = 'all';
    let completingId = null;

    document.addEventListener('DOMContentLoaded', () => {
      session = checkAuth('technician');
      if (!session) return;

      document.getElementById('tech-name').textContent = session.name;
      document.getElementById('tech-avatar').textContent = session.name.charAt(0).toUpperCase();

      renderLanguageSelector('lang-container');
      applyTranslations();
      initSidebar();
      loadComplaints();

      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('filter-tab--active'));
          tab.classList.add('filter-tab--active');
          currentFilter = tab.dataset.filter;
          loadComplaints();
        });
      });

      // Image preview
      document.getElementById('proof-image').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            document.getElementById('preview-img').src = ev.target.result;
            document.getElementById('image-preview').style.display = 'block';
          };
          reader.readAsDataURL(file);
        }
      });
    });

    function loadComplaints() {
      const all = db.getAll('gs_complaints').filter(c => c.technician_id === session.technician_id);

      const assigned = all.filter(c => c.status === 'Assigned').length;
      const inProgress = all.filter(c => c.status === 'In Progress').length;
      const completed = all.filter(c => c.status === 'Completed').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat-card stat-card--primary">
          <div class="stat-card__label">Total Assigned</div>
          <div class="stat-card__value">${all.length}</div>
        </div>
        <div class="stat-card stat-card--accent">
          <div class="stat-card__label" data-i18n="assigned">New</div>
          <div class="stat-card__value">${assigned}</div>
        </div>
        <div class="stat-card stat-card--info">
          <div class="stat-card__label" data-i18n="in_progress">In Progress</div>
          <div class="stat-card__value">${inProgress}</div>
        </div>
        <div class="stat-card stat-card--success">
          <div class="stat-card__label" data-i18n="completed">Completed</div>
          <div class="stat-card__value">${completed}</div>
        </div>
      `;

      const filtered = currentFilter === 'all' ? all : all.filter(c => c.status === currentFilter);
      const listEl = document.getElementById('complaints-list');

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h3 data-i18n="no_complaints">No complaints found</h3>
            <p>No complaints match the current filter.</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = filtered
        .sort((a, b) => {
          // Prioritize non-completed: Assigned first, then In Progress, then Completed
          const statusOrder = { 'Assigned': 0, 'In Progress': 1, 'Completed': 2 };
          const orderDiff = (statusOrder[a.status] || 3) - (statusOrder[b.status] || 3);
          if (orderDiff !== 0) return orderDiff;
          return new Date(b.created_at) - new Date(a.created_at);
        })
        .map(c => {
          let actionButtons = '';

          if (c.status === 'Assigned') {
            actionButtons = `
              <button class="btn btn--primary btn--sm" onclick="acceptJob('${c.complaint_id}')" data-i18n="accept_job">Accept Job</button>
              <button class="btn btn--outline btn--sm" onclick="showDetail('${c.complaint_id}')" data-i18n="view_details">Details</button>
            `;
          } else if (c.status === 'In Progress') {
            actionButtons = `
              <button class="btn btn--accent btn--sm" onclick="openUploadModal('${c.complaint_id}')" data-i18n="mark_complete">Mark Complete</button>
              <button class="btn btn--outline btn--sm" onclick="showDetail('${c.complaint_id}')" data-i18n="view_details">Details</button>
            `;
          } else {
            actionButtons = `
              <button class="btn btn--outline btn--sm" onclick="showDetail('${c.complaint_id}')" data-i18n="view_details">Details</button>
            `;
          }

          return `
            <div class="complaint-card">
              <div class="complaint-card__header">
                <div>
                  <div class="complaint-card__title">${escapeHtml(c.title)}</div>
                  <span class="complaint-card__id">#${c.complaint_id}</span>
                </div>
                <div style="display:flex; gap:8px; align-items:center;">
                  ${c.priority ? priorityBadge(c.priority) : ''}
                  ${statusBadge(c.status)}
                </div>
              </div>
              <div class="complaint-card__meta">
                <span>${c.category}</span>
                <span>${escapeHtml(c.village)}, ${escapeHtml(c.district)}</span>
                <span>${formatDate(c.created_at)}</span>
              </div>
              <div class="complaint-card__desc">${escapeHtml(c.description).substring(0, 150)}${c.description.length > 150 ? '...' : ''}</div>
              <div style="background:var(--gs-bg); border-radius:var(--gs-radius); padding:10px 14px; margin-bottom:12px; font-size:0.8125rem; color:var(--gs-text-secondary);">
                <strong style="color:var(--gs-text);">Location:</strong> ${escapeHtml(c.address)}, ${escapeHtml(c.village)}, ${escapeHtml(c.district)}, ${escapeHtml(c.state)} - ${c.pincode}
              </div>
              <div class="complaint-card__actions">
                ${actionButtons}
              </div>
            </div>
          `;
        }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function acceptJob(id) {
      db.update('gs_complaints', 'complaint_id', id, { status: 'In Progress' });
      showToast('Job accepted! Status updated to In Progress.', 'success');
      loadComplaints();
    }

    function openUploadModal(id) {
      completingId = id;
      document.getElementById('proof-image').value = '';
      document.getElementById('image-preview').style.display = 'none';
      document.getElementById('upload-modal').classList.add('active');

      document.getElementById('confirm-complete-btn').onclick = () => {
        const fileInput = document.getElementById('proof-image');
        const file = fileInput.files[0];

        if (!file) {
          showToast('Please upload an image as proof of completion.', 'error');
          return;
        }

        const reader = new FileReader();
        reader.onload = (ev) => {
          db.update('gs_complaints', 'complaint_id', completingId, {
            status: 'Completed',
            image_proof: ev.target.result
          });
          showToast('Work marked as completed! Admin has been notified.', 'success');
          closeUploadModal();
          loadComplaints();
        };
        reader.readAsDataURL(file);
      };
    }

    function closeUploadModal() {
      completingId = null;
      document.getElementById('upload-modal').classList.remove('active');
    }

    function showDetail(id) {
      const c = db.getById('gs_complaints', 'complaint_id', id);
      if (!c) return;

      document.getElementById('detail-body').innerHTML = `
        <div class="detail-row"><div class="detail-row__label">Complaint ID</div><div class="detail-row__value" style="font-family:monospace;">${c.complaint_id}</div></div>
        <div class="detail-row"><div class="detail-row__label">Title</div><div class="detail-row__value">${escapeHtml(c.title)}</div></div>
        <div class="detail-row"><div class="detail-row__label">Description</div><div class="detail-row__value">${escapeHtml(c.description)}</div></div>
        <div class="detail-row"><div class="detail-row__label">Category</div><div class="detail-row__value">${c.category}</div></div>
        <div class="detail-row"><div class="detail-row__label">Priority</div><div class="detail-row__value">${c.priority ? priorityBadge(c.priority) : 'Not set'}</div></div>
        <div class="detail-row"><div class="detail-row__label">Status</div><div class="detail-row__value">${statusBadge(c.status)}</div></div>
        <div class="detail-row"><div class="detail-row__label">Full Address</div><div class="detail-row__value">${escapeHtml(c.address)}, ${escapeHtml(c.village)}, ${escapeHtml(c.district)}, ${escapeHtml(c.state)} - ${c.pincode}</div></div>
        <div class="detail-row"><div class="detail-row__label">Filed By</div><div class="detail-row__value">${escapeHtml(c.user_name || 'Unknown')}</div></div>
        <div class="detail-row"><div class="detail-row__label">Filed On</div><div class="detail-row__value">${formatDate(c.created_at)}</div></div>
        ${c.image_proof ? `<div class="detail-row"><div class="detail-row__label">Proof Image</div><div class="detail-row__value"><img src="${c.image_proof}" style="max-width:100%; border-radius:8px; border:1px solid var(--gs-border);" alt="Completion proof"></div></div>` : ''}
      `;

      document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetailModal() {
      document.getElementById('detail-modal').classList.remove('active');
    }

    document.getElementById('upload-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeUploadModal();
    });
    document.getElementById('detail-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDetailModal();
    });
  </script>
</body>
</html>
