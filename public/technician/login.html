<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technician Login - GramSeva</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__header">
        <div class="auth-card__logo">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z"/>
            <path d="M10 16l4 4 8-8"/>
          </svg>
          <span>GramSeva</span>
        </div>
        <h2 data-i18n="login">Login</h2>
        <p data-i18n="tech_portal">Technician Portal</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="tech-id" data-i18n="tech_id">Technician ID</label>
          <input type="text" id="tech-id" class="form-input" required placeholder="e.g., TECH-001">
        </div>

        <div class="form-group">
          <label for="password" data-i18n="password">Password</label>
          <input type="password" id="password" class="form-input" required>
        </div>

        <button type="submit" class="btn btn--primary btn--block" data-i18n="login">Login</button>
      </form>

      <div class="auth-card__footer">
        <a href="/index.html">Back to Home</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      applyTranslations();
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const techId = document.getElementById('tech-id').value.trim();
      const password = document.getElementById('password').value;

      if (!techId || !password) {
        showToast('Please fill in all fields.', 'error');
        return;
      }

      const tech = db.getById('gs_technicians', 'technician_id', techId);
      if (!tech) {
        showToast('Technician ID not found.', 'error');
        return;
      }

      const hashedPw = await hashPassword(password);
      if (tech.password !== hashedPw) {
        showToast(t('login_failed'), 'error');
        return;
      }

      setSession('technician', {
        technician_id: tech.technician_id,
        name: tech.name,
        phone: tech.phone,
        area: tech.area
      });

      window.location.href = '/technician/dashboard.html';
    });
  </script>
</body>
</html>
